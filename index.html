<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  /* 노션 다크모드 스타일 반영 */
  :root {
    --bg-color: #191919; /* 노션 다크모드 배경색 */
    --text-primary: #FFFFFF;
    --text-secondary: rgba(255, 255, 255, 0.7);
    --border-color: rgba(255, 255, 255, 0.15);
    --accent-color: #2EAADC; /* 금융 서비스 느낌의 블루 포인트 */
    --card-bg: #202020;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 16px;
    line-height: 1.6;
  }

  /* 탭 바 디자인 개선 */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 2px;
  }

  .tab-btn {
    padding: 8px 16px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover {
    background-color: rgba(255, 255, 255, 0.05);
    border-radius: 4px 4px 0 0;
  }

  /* 활성화된 탭 - 밑줄 강조 */
  .tab-btn.active {
    color: var(--text-primary);
    font-weight: 600;
  }

  .tab-btn.active::after {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: var(--accent-color);
  }

  /* 콘텐츠 영역 */
  .tab-panel { display: none; animation: fadeIn 0.3s ease; }
  .tab-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 카드 및 섹션 스타일 */
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .section-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
  
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent-color); }
  .card-body { font-size: 13px; color: var(--text-secondary); margin: 0; }

  /* 플로우 디자인 */
  .flow-row { display: flex; align-items: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
  .flow-step {
    background: #2B2B2B;
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
  }
  .highlight { border-color: var(--accent-color); color: var(--accent-color); }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('trust')">① MTS 신탁잔고</button>
  <button class="tab-btn" onclick="switchTab('isa')">② 신탁형 ISA</button>
  <button class="tab-btn" onclick="switchTab('wrap')">③ Wrap형 CMS</button>
</div>

<div id="panel-trust" class="tab-panel active">
  <div class="section-title">MTS 신탁잔고 조회</div>
  <div class="section-sub">비대면 실시간 잔고 및 수익률 확인 서비스</div>
  <div class="card">
    <p class="card-title">📌 개선 포인트</p>
    <p class="card-body">영업점 방문 없이 MTS에서 직접 자산 현황과 기간별 수익률을 시각화하여 제공합니다.</p>
  </div>
  <div class="flow-row">
    <div class="flow-step">앱 로그인</div>
    <span>→</span>
    <div class="flow-step">신탁 메뉴</div>
    <span>→</span>
    <div class="flow-step highlight">실시간 조회</div>
  </div>
</div>

<div id="panel-isa" class="tab-panel">
  <div class="section-title">신탁형 ISA 정기예금 매매</div>
  <div class="section-sub">절세 계좌 내 상품 운용 디지털 전환</div>
  <div class="card">
    <p class="card-title">📌 주요 기능</p>
    <p class="card-body">정기예금 신규 매수 및 중도해지 프로세스를 앱 내에서 완결합니다.</p>
  </div>
</div>

<div id="panel-wrap" class="tab-panel">
  <div class="section-title">Wrap형 CMS 법인 매도신청</div>
  <div class="section-sub">법인 자금 관리 효율화를 위한 자동 매도 연계</div>
  <div class="card">
    <p class="card-title">📌 보안 요건</p>
    <p class="card-body">법인 권한자 전자서명 및 CMS 전용 계좌 검증 단계를 포함합니다.</p>
  </div>
</div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.innerText.includes(id === 'trust' ? '신탁잔고' : id === 'isa' ? 'ISA' : 'CMS')) btn.classList.add('active');
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.remove('active');
  });
  document.getElementById('panel-' + id).classList.add('active');
}
</script>

</body>
</html>
